<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#070711">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>XO — Polyplayer</title>
    <style>
        :root {
            --bg:        #070711;
            --surface:   rgba(30,30,48,0.7);
            --panel:     rgba(45,45,70,0.5);
            --border:    rgba(255,255,255,0.08);
            --primary:   #8a2be2;
            --pglow:     rgba(138,43,226,0.5);
            --secondary: #00d2ff;
            --sglow:     rgba(0,210,255,0.5);
            --success:   #00ff88;
            --danger:    #ff3366;
            --coin:      #ffd700;
            --muted:     #8e8e9f;
            --white:     #ffffff;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top:    env(safe-area-inset-top, 0px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--white);
            min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(138,43,226,0.15), transparent 30%),
                radial-gradient(circle at 85% 20%, rgba(0,210,255,0.15), transparent 30%);
        }

        /* ── HEADER ── */
        header {
            width: 100%; padding: calc(14px + var(--safe-top)) 20px 14px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(7,7,17,0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .back-btn {
            background: rgba(255,255,255,0.07); border: 1px solid var(--border);
            color: var(--white); padding: 8px 14px; border-radius: 10px;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
        }
        .header-title { font-size: 1.1rem; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; color: transparent; }
        .header-pot { font-size: 0.85rem; font-weight: 800; color: var(--coin); }

        /* ── MAIN CONTENT ── */
        main {
            flex: 1; width: 100%; max-width: 480px;
            padding: 24px 20px calc(24px + var(--safe-bottom));
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }

        /* ── PLAYER CARDS ── */
        .players-row { width: 100%; display: flex; gap: 12px; align-items: center; }
        .player-card {
            flex: 1; padding: 14px 12px; border-radius: 16px;
            background: var(--surface); border: 2px solid var(--border);
            text-align: center; transition: all 0.3s;
        }
        .player-card.x-card.active { border-color: var(--primary); box-shadow: 0 0 16px var(--pglow); }
        .player-card.o-card.active { border-color: var(--secondary); box-shadow: 0 0 16px var(--sglow); }
        .player-symbol { font-size: 1.8rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
        .player-card.x-card .player-symbol { color: var(--primary); }
        .player-card.o-card .player-symbol { color: var(--secondary); }
        .player-name { font-size: 0.75rem; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-label { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
        .vs-badge { font-size: 1rem; font-weight: 900; color: var(--muted); flex-shrink: 0; }

        /* ── STATUS BAR ── */
        .status-bar {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            background: var(--panel); border: 1px solid var(--border);
            text-align: center; font-size: 0.9rem; font-weight: 700;
            min-height: 44px; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .status-bar.your-turn { border-color: var(--success); color: var(--success); }
        .status-bar.their-turn { border-color: var(--muted); color: var(--muted); }
        .status-bar.win  { border-color: var(--coin); color: var(--coin); }
        .status-bar.lose { border-color: var(--danger); color: var(--danger); }
        .status-bar.draw { border-color: var(--secondary); color: var(--secondary); }

        /* ── BOARD ── */
        .board-wrap {
            width: 100%; aspect-ratio: 1/1; max-width: 340px;
            display: grid; grid-template-columns: repeat(3,1fr);
            gap: 10px; padding: 10px;
            background: var(--surface); border-radius: 20px;
            border: 1px solid var(--border);
        }
        .cell {
            aspect-ratio: 1/1; border-radius: 14px;
            background: rgba(0,0,0,0.35); border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; font-weight: 900; cursor: pointer;
            transition: all 0.15s; position: relative; overflow: hidden;
        }
        .cell:active:not(.taken) { transform: scale(0.92); }
        .cell.taken { cursor: default; }
        .cell.x { color: var(--primary); border-color: rgba(138,43,226,0.4);
            background: rgba(138,43,226,0.08); }
        .cell.o { color: var(--secondary); border-color: rgba(0,210,255,0.4);
            background: rgba(0,210,255,0.08); }
        .cell.winning { animation: pulse-win 0.6s ease infinite alternate; }
        .cell.x.winning { border-color: var(--primary); background: rgba(138,43,226,0.2); }
        .cell.o.winning { border-color: var(--secondary); background: rgba(0,210,255,0.2); }
        @keyframes pulse-win {
            from { transform: scale(1); }
            to   { transform: scale(1.06); box-shadow: 0 0 20px currentColor; }
        }
        .cell:not(.taken):hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }

        /* ── RESULT OVERLAY ── */
        #result-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.88);
            z-index: 9000; display: none; flex-direction: column;
            align-items: center; justify-content: center; padding: 30px;
        }
        #result-overlay.show { display: flex; }
        .result-icon { font-size: 5rem; margin-bottom: 10px; animation: pop 0.4s cubic-bezier(0.2,0.8,0.2,1); }
        .result-title { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
        .result-sub { font-size: 1rem; color: var(--muted); margin-bottom: 6px; }
        .result-coins { font-size: 1.4rem; font-weight: 900; color: var(--coin); margin-bottom: 28px; }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .result-btn {
            width: 100%; max-width: 300px; padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; border-radius: 14px; font-size: 1.05rem; font-weight: 800;
            color: white; cursor: pointer; margin-bottom: 10px;
        }
        .result-btn-secondary {
            width: 100%; max-width: 300px; padding: 14px;
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            border-radius: 14px; font-size: 0.95rem; font-weight: 700;
            color: var(--muted); cursor: pointer;
        }

        /* ── WAITING OVERLAY ── */
        #waiting-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 30px; gap: 20px;
            background-image:
                radial-gradient(circle at top, rgba(138,43,226,0.2), transparent 50%),
                radial-gradient(circle at bottom, rgba(0,210,255,0.2), transparent 50%);
        }
        .waiting-spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--secondary);
            border-radius: 50%; animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .waiting-title { font-size: 1.5rem; font-weight: 900; text-align: center; }
        .waiting-sub { font-size: 0.9rem; color: var(--muted); text-align: center; }
        .waiting-code {
            font-size: 2rem; font-weight: 900; letter-spacing: 8px;
            color: var(--secondary); padding: 14px 24px;
            background: rgba(0,210,255,0.08); border-radius: 14px;
            border: 1px dashed rgba(0,210,255,0.3); cursor: pointer;
        }
        .waiting-hint { font-size: 0.8rem; color: var(--muted); }

        /* ── ERROR SCREEN ── */
        #error-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: none; flex-direction: column; align-items: center;
            justify-content: center; padding: 30px; gap: 16px; text-align: center;
        }
        #error-screen.show { display: flex; }
        .error-icon { font-size: 4rem; }
        .error-msg { font-size: 1rem; color: var(--muted); max-width: 300px; }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(30,30,50,0.97); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 20px; font-size: 0.88rem;
            font-weight: 600; z-index: 10000; opacity: 0; transition: all 0.3s;
            pointer-events: none; white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.success { border-color: var(--success); color: var(--success); }
        #toast.error   { border-color: var(--danger);  color: var(--danger); }
        #toast.info    { border-color: var(--secondary); color: var(--secondary); }
    </style>
</head>
<body>

<div id="toast"></div>

<!-- WAITING FOR OPPONENT -->
<div id="waiting-overlay">
    <div class="waiting-spinner"></div>
    <div class="waiting-title">Waiting for opponent...</div>
    <div class="waiting-sub">Share this code with your friend</div>
    <div class="waiting-code" id="waiting-code" onclick="copyCode()">------</div>
    <div class="waiting-hint">Tap code to copy</div>
</div>

<!-- ERROR SCREEN -->
<div id="error-screen">
    <div class="error-icon">⚠️</div>
    <div class="waiting-title" style="color:var(--danger);">Connection Error</div>
    <div class="error-msg" id="error-msg">Could not connect to the game server.</div>
    <button class="result-btn" style="margin-top:10px;" onclick="window.close(); history.back();">Close</button>
    <button class="result-btn-secondary" onclick="location.reload()">Retry</button>
</div>

<!-- RESULT OVERLAY -->
<div id="result-overlay">
    <div class="result-icon" id="result-icon">🏆</div>
    <div class="result-title" id="result-title">You Win!</div>
    <div class="result-sub" id="result-sub">Great game!</div>
    <div class="result-coins" id="result-coins"></div>
    <button class="result-btn" onclick="window.close(); history.back();">Back to Games</button>
    <button class="result-btn-secondary" onclick="location.reload()">Play Again</button>
</div>

<!-- HEADER -->
<header>
    <button class="back-btn" onclick="confirmLeave()">← Back</button>
    <div class="header-title">XO</div>
    <div class="header-pot" id="header-pot">🪙 —</div>
</header>

<!-- MAIN GAME -->
<main>
    <!-- PLAYERS -->
    <div class="players-row">
        <div class="player-card x-card active" id="card-x">
            <div class="player-symbol">✕</div>
            <div class="player-name" id="name-x">Player X</div>
            <div class="player-label">X</div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="player-card o-card" id="card-o">
            <div class="player-symbol">○</div>
            <div class="player-name" id="name-o">Player O</div>
            <div class="player-label">O</div>
        </div>
    </div>

    <!-- STATUS -->
    <div class="status-bar your-turn" id="status-bar">Your turn — play X</div>

    <!-- BOARD -->
    <div class="board-wrap" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>
</main>

<script>
// ═══════════════════════════════════════════
//  PARSE URL PARAMS
// ═══════════════════════════════════════════
const params    = new URLSearchParams(location.search);
const LOBBY_ID  = params.get('lobby');
const TOKEN     = params.get('token');
const API_BASE  = location.origin;   // same server

if (!LOBBY_ID || !TOKEN) {
    showError('Missing lobby or token. Please join from the main site.');
}

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
let myUsername   = null;
let mySymbol     = null;   // 'X' or 'O'
let opponentName = null;
let opponentSymbol = null;
let board        = Array(9).fill(null);  // null | 'X' | 'O'
let gameOver     = false;
let isMyTurn     = false;
let pot          = 0;
let lobbyCode    = '';
let ws           = null;

const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8], // rows
    [0,3,6],[1,4,7],[2,5,8], // cols
    [0,4,8],[2,4,6]          // diags
];

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
let toastTimer;
function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = '', 2800);
}

// ═══════════════════════════════════════════
//  ERROR SCREEN
// ═══════════════════════════════════════════
function showError(msg) {
    document.getElementById('waiting-overlay').style.display = 'none';
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-screen').classList.add('show');
}

// ═══════════════════════════════════════════
//  API HELPER
// ═══════════════════════════════════════════
async function api(method, path, body) {
    try {
        const res = await fetch(API_BASE + path, {
            method,
            headers: {
                'Content-Type':  'application/json',
                'Authorization': `Bearer ${TOKEN}`,
            },
            body: body ? JSON.stringify(body) : undefined,
        });
        return await res.json();
    } catch {
        return { ok: false, error: 'Network error.' };
    }
}

// ═══════════════════════════════════════════
//  COPY LOBBY CODE
// ═══════════════════════════════════════════
function copyCode() {
    if (!lobbyCode) return;
    navigator.clipboard.writeText(lobbyCode).then(() => {
        showToast(`Code ${lobbyCode} copied!`, 'success');
    }).catch(() => {
        showToast(`Your code: ${lobbyCode}`, 'info');
    });
}

// ═══════════════════════════════════════════
//  INIT — fetch my profile + lobby info
// ═══════════════════════════════════════════
async function init() {
    // Get my username
    const me = await api('GET', '/api/me');
    if (!me.ok) { showError('Session expired. Please log in again.'); return; }
    myUsername = me.username;

    // Get lobby info
    const lobbyData = await api('GET', `/api/lobby/${LOBBY_ID}`);
    if (!lobbyData.ok) { showError('Lobby not found.'); return; }

    pot       = lobbyData.lobby.pot;
    lobbyCode = lobbyData.lobby.lobby_code || '';
    document.getElementById('header-pot').textContent = `🪙 ${pot}`;
    document.getElementById('waiting-code').textContent = lobbyCode || '------';

    // Assign symbols based on who joined first
    const members = lobbyData.members || [];
    if (members.length >= 1) {
        const first  = members[0];
        const second = members[1];
        if (first.username === myUsername) {
            mySymbol       = 'X';
            opponentSymbol = 'O';
            opponentName   = second ? second.display_name : '?';
        } else {
            mySymbol       = 'O';
            opponentSymbol = 'X';
            opponentName   = first.display_name;
        }
        document.getElementById('name-x').textContent =
            members[0].username === myUsername ? 'You' : members[0].display_name;
        document.getElementById('name-o').textContent =
            members[1] ? (members[1].username === myUsername ? 'You' : members[1].display_name) : 'Waiting...';
    }

    // X always goes first
    isMyTurn = (mySymbol === 'X');

    if (members.length >= 2) {
        // Both players already here — hide waiting, start game
        document.getElementById('waiting-overlay').style.display = 'none';
        updateStatus();
    }

    connectWs();
}

// ═══════════════════════════════════════════
//  WEBSOCKET
// ═══════════════════════════════════════════
function connectWs() {
    if (ws) ws.close();
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const host  = location.host;
    ws = new WebSocket(`${proto}://${host}/ws?lobby_id=${LOBBY_ID}&token=${TOKEN}`);

    ws.onopen  = () => console.log('[XO] WS connected');
    ws.onclose = () => { if (!gameOver) showToast('Connection lost. Reconnecting...', 'error'); setTimeout(connectWs, 3000); }
    ws.onerror = () => {};

    ws.onmessage = e => {
        try { handleWsMsg(JSON.parse(e.data)); } catch {}
    };

    // Keep-alive ping
    setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
    }, 25000);
}

function handleWsMsg(msg) {
    if (msg.type === 'system') {
        // Opponent joined
        if (msg.message && msg.message.includes('joined')) {
            refreshLobby();
        }
        return;
    }
    if (msg.type === 'xo_move') {
        // Opponent made a move
        if (msg.player !== myUsername) {
            applyMove(msg.index, msg.symbol, false);
        }
        return;
    }
    if (msg.type === 'match_over') {
        // Server confirmed winner and distributed coins
        return; // result already shown via checkWin()
    }
    if (msg.type === 'player_left') {
        if (!gameOver) {
            showToast('Opponent disconnected!', 'error');
        }
        return;
    }
}

async function refreshLobby() {
    const lobbyData = await api('GET', `/api/lobby/${LOBBY_ID}`);
    if (!lobbyData.ok) return;
    const members = lobbyData.members || [];
    if (members.length >= 2) {
        pot = lobbyData.lobby.pot;
        document.getElementById('header-pot').textContent = `🪙 ${pot}`;

        const first  = members[0];
        const second = members[1];
        if (first.username === myUsername) {
            opponentName = second.display_name;
        } else {
            opponentName = first.display_name;
        }
        document.getElementById('name-x').textContent =
            members[0].username === myUsername ? 'You' : members[0].display_name;
        document.getElementById('name-o').textContent =
            members[1].username === myUsername ? 'You' : members[1].display_name;

        document.getElementById('waiting-overlay').style.display = 'none';
        isMyTurn = (mySymbol === 'X');
        updateStatus();
        showToast('Opponent joined! Game starts!', 'success');
    }
}

// ═══════════════════════════════════════════
//  MAKE A MOVE (my turn)
// ═══════════════════════════════════════════
function makeMove(index) {
    if (!isMyTurn || gameOver || board[index] !== null) return;
    if (document.getElementById('waiting-overlay').style.display !== 'none') return;

    applyMove(index, mySymbol, true);

    // Broadcast move to opponent via WebSocket chat channel
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            type:   'xo_move',
            index,
            symbol: mySymbol,
            player: myUsername,
        }));
    }
}

function applyMove(index, symbol, isMine) {
    if (board[index] !== null || gameOver) return;
    board[index] = symbol;

    const cells = document.querySelectorAll('.cell');
    const cell  = cells[index];
    cell.textContent = symbol === 'X' ? '✕' : '○';
    cell.classList.add('taken', symbol.toLowerCase());

    isMyTurn = isMine ? false : true;

    const result = checkWin();
    if (!result) updateStatus();
}

// ═══════════════════════════════════════════
//  CHECK WIN / DRAW
// ═══════════════════════════════════════════
function checkWin() {
    for (const [a,b,c] of WIN_LINES) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
            const winSymbol = board[a];
            highlightWin([a,b,c]);
            const iWon = (winSymbol === mySymbol);
            endGame(iWon ? 'win' : 'lose', iWon ? myUsername : opponentName);
            return true;
        }
    }
    if (board.every(c => c !== null)) {
        endGame('draw', null);
        return true;
    }
    return false;
}

function highlightWin(indices) {
    const cells = document.querySelectorAll('.cell');
    indices.forEach(i => cells[i].classList.add('winning'));
}

// ═══════════════════════════════════════════
//  END GAME
// ═══════════════════════════════════════════
async function endGame(result, winnerUsername) {
    gameOver = true;
    updateStatus(result);

    // Only the winner (or X on draw) reports to server — avoids double-reporting
    const shouldReport = (result === 'win' && winnerUsername === myUsername) ||
                         (result === 'draw' && mySymbol === 'X');

    if (shouldReport && result !== 'draw') {
        await api('POST', '/api/match/result', {
            lobby_id:        LOBBY_ID,
            winner_username: winnerUsername,
        });
    }

    // Show result overlay after a short delay so winning cells animate first
    setTimeout(() => showResult(result, winnerUsername), 900);
}

function showResult(result, winnerUsername) {
    const overlay    = document.getElementById('result-overlay');
    const iconEl     = document.getElementById('result-icon');
    const titleEl    = document.getElementById('result-title');
    const subEl      = document.getElementById('result-sub');
    const coinsEl    = document.getElementById('result-coins');

    if (result === 'win') {
        iconEl.textContent  = '🏆';
        titleEl.textContent = 'You Win!';
        titleEl.style.color = 'var(--coin)';
        subEl.textContent   = `You beat ${opponentName}!`;
        coinsEl.textContent = `+${pot} 🪙 added to your wallet`;
    } else if (result === 'lose') {
        iconEl.textContent  = '😔';
        titleEl.textContent = 'You Lost';
        titleEl.style.color = 'var(--danger)';
        subEl.textContent   = `${winnerUsername} wins this round.`;
        coinsEl.textContent = '';
    } else {
        iconEl.textContent  = '🤝';
        titleEl.textContent = "It's a Draw!";
        titleEl.style.color = 'var(--secondary)';
        subEl.textContent   = 'Nobody wins this time.';
        coinsEl.textContent = 'Stake will be refunded by admin.';
    }

    overlay.classList.add('show');
}

// ═══════════════════════════════════════════
//  UPDATE STATUS BAR
// ═══════════════════════════════════════════
function updateStatus(result) {
    const bar = document.getElementById('status-bar');
    const xCard = document.getElementById('card-x');
    const oCard = document.getElementById('card-o');

    // Reset active classes
    xCard.classList.remove('active');
    oCard.classList.remove('active');
    bar.className = 'status-bar';

    if (result === 'win') {
        bar.textContent = '🏆 You Win!';
        bar.classList.add('win');
    } else if (result === 'lose') {
        bar.textContent = '😔 You Lost';
        bar.classList.add('lose');
    } else if (result === 'draw') {
        bar.textContent = "🤝 It's a Draw!";
        bar.classList.add('draw');
    } else if (isMyTurn) {
        bar.textContent = `Your turn — play ${mySymbol === 'X' ? '✕' : '○'}`;
        bar.classList.add('your-turn');
        if (mySymbol === 'X') xCard.classList.add('active');
        else oCard.classList.add('active');
    } else {
        bar.textContent = `${opponentName || 'Opponent'}'s turn...`;
        bar.classList.add('their-turn');
        if (mySymbol === 'X') oCard.classList.add('active');
        else xCard.classList.add('active');
    }
}

// ═══════════════════════════════════════════
//  CONFIRM LEAVE
// ═══════════════════════════════════════════
function confirmLeave() {
    if (gameOver) { window.close(); history.back(); return; }
    if (confirm('Leave the game? You will forfeit your stake.')) {
        window.close();
        history.back();
    }
}

// ═══════════════════════════════════════════
//  HANDLE XO MOVE MESSAGES THROUGH WS
//  (the server uses 'chat' channel for custom messages)
// ═══════════════════════════════════════════
// Patch: intercept custom xo_move messages sent as chat type
const _originalHandleWsMsg = handleWsMsg;
// The server re-broadcasts anything sent to /ws as a message.
// We send xo_move as a JSON string in a chat message body so the server
// passes it through without modification.
// Override ws.onmessage to handle both:
function setupWsMessageHandler() {
    if (!ws) return;
    ws.onmessage = e => {
        try {
            const outer = JSON.parse(e.data);
            // Try to parse inner xo_move payload from chat message
            if (outer.type === 'chat' && outer.message) {
                try {
                    const inner = JSON.parse(outer.message);
                    if (inner.type === 'xo_move') {
                        handleWsMsg(inner);
                        return;
                    }
                } catch {}
            }
            handleWsMsg(outer);
        } catch {}
    };
}

// ═══════════════════════════════════════════
//  PATCH makeMove to send via chat channel
// ═══════════════════════════════════════════
const _originalMakeMove = makeMove;
function makeMove(index) {
    if (!isMyTurn || gameOver || board[index] !== null) return;
    if (document.getElementById('waiting-overlay').style.display !== 'none') return;

    applyMove(index, mySymbol, true);

    // Send move as a chat message containing JSON — server broadcasts to all in lobby
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            type: 'chat',
            message: JSON.stringify({
                type:   'xo_move',
                index,
                symbol: mySymbol,
                player: myUsername,
            }),
        }));
    }
}

// ═══════════════════════════════════════════
//  PATCH connectWs to use setupWsMessageHandler
// ═══════════════════════════════════════════
const _origConnectWs = connectWs;
function connectWs() {
    if (ws) ws.close();
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws?lobby_id=${LOBBY_ID}&token=${TOKEN}`);

    ws.onopen  = () => {
        console.log('[XO] WS connected');
        setupWsMessageHandler();
    };
    ws.onclose = () => {
        if (!gameOver) showToast('Connection lost. Reconnecting...', 'error');
        setTimeout(connectWs, 3000);
    };
    ws.onerror = () => {};

    setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
    }, 25000);
}

// ═══════════════════════════════════════════
//  START
// ═══════════════════════════════════════════
if (LOBBY_ID && TOKEN) init();
</script>
