<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>XO — Polyplayer</title>
<style>
  :root {
    --bg:      #0d0d0d;
    --card:    #1a1a1a;
    --border:  #2a2a2a;
    --x-col:   #ff4757;
    --o-col:   #2ed573;
    --muted:   #555;
    --white:   #f0f0f0;
    --coin:    #ffd700;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 20px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

  body {
    font-family: 'Courier New', Courier, monospace;
    background: var(--bg);
    color: var(--white);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    padding: calc(12px + var(--safe-top)) 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .back-btn:active { opacity: 0.6; }
  .logo {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--white);
  }
  .logo span.x { color: var(--x-col); }
  .logo span.o { color: var(--o-col); }
  .pot-badge {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--coin);
    letter-spacing: 1px;
  }

  /* ── MAIN ── */
  main {
    flex: 1;
    width: 100%;
    max-width: 440px;
    padding: 28px 20px calc(28px + var(--safe-bot));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* ── SCOREBOARD ── */
  .scoreboard {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
  }
  .player-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .player-slot.active-x { border-color: var(--x-col); box-shadow: 0 0 12px rgba(255,71,87,0.3); }
  .player-slot.active-o { border-color: var(--o-col); box-shadow: 0 0 12px rgba(46,213,115,0.3); }
  .player-sym { font-size: 1.6rem; font-weight: 900; line-height: 1; }
  .player-sym.x { color: var(--x-col); }
  .player-sym.o { color: var(--o-col); }
  .player-name { font-size: 0.7rem; color: var(--white); letter-spacing: 1px; text-transform: uppercase; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .vs-text { font-size: 0.75rem; color: var(--muted); letter-spacing: 3px; text-align: center; }

  /* ── STATUS ── */
  .status {
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
    transition: color 0.2s;
  }
  .status.your-turn { color: var(--o-col); }
  .status.their-turn { color: var(--muted); }
  .status.win  { color: var(--coin); }
  .status.lose { color: var(--x-col); }
  .status.draw { color: var(--white); }

  /* ── BOARD ── */
  .board {
    width: 100%;
    max-width: 360px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .cell {
    aspect-ratio: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.6rem;
    font-weight: 900;
    cursor: pointer;
    transition: background 0.1s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .cell:active:not(.taken) { transform: scale(0.94); background: #222; }
  .cell.taken { cursor: default; }
  .cell.x { color: var(--x-col); }
  .cell.o { color: var(--o-col); }
  .cell.winning {
    animation: flash 0.5s ease infinite alternate;
  }
  .cell.x.winning { background: rgba(255,71,87,0.12); border-color: var(--x-col); }
  .cell.o.winning { background: rgba(46,213,115,0.12); border-color: var(--o-col); }
  @keyframes flash {
    from { opacity: 1; }
    to   { opacity: 0.5; }
  }

  /* ── WAITING OVERLAY ── */
  #waiting-overlay {
    position: fixed; inset: 0; background: var(--bg);
    z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; padding: 30px; text-align: center;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--o-col);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .wait-title { font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; }
  .wait-code {
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 10px;
    color: var(--o-col);
    border: 1px dashed var(--o-col);
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
  }
  .wait-hint { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; }

  /* ── RESULT OVERLAY ── */
  #result-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 9000;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 30px; text-align: center;
  }
  #result-overlay.show { display: flex; }
  .result-icon { font-size: 4rem; }
  .result-title { font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; }
  .result-sub { font-size: 0.85rem; color: var(--muted); letter-spacing: 2px; }
  .result-coins { font-size: 1.2rem; font-weight: 700; color: var(--coin); margin-top: 4px; }
  .btn-primary {
    margin-top: 10px;
    width: 100%; max-width: 280px;
    padding: 14px;
    background: var(--white); color: var(--bg);
    border: none; border-radius: 8px;
    font-family: inherit; font-size: 0.9rem;
    font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
  }
  .btn-secondary {
    width: 100%; max-width: 280px;
    padding: 12px;
    background: none; color: var(--muted);
    border: 1px solid var(--border); border-radius: 8px;
    font-family: inherit; font-size: 0.85rem;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  }

  /* ── ERROR ── */
  #error-screen {
    position: fixed; inset: 0; background: var(--bg);
    z-index: 9999; display: none;
    flex-direction: column; align-items: center;
    justify-content: center; gap: 16px;
    padding: 30px; text-align: center;
  }
  #error-screen.show { display: flex; }
  .err-title { font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; color: var(--x-col); }
  .err-msg { font-size: 0.85rem; color: var(--muted); max-width: 300px; line-height: 1.6; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: calc(16px + var(--safe-bot));
    left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 18px;
    font-size: 0.8rem; letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 10000; opacity: 0;
    transition: all 0.25s; pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--o-col); color: var(--o-col); }
  #toast.error   { border-color: var(--x-col); color: var(--x-col); }
  #toast.info    { border-color: var(--muted); color: var(--white); }
</style>
</head>
<body>

<div id="toast"></div>

<!-- WAITING -->
<div id="waiting-overlay">
  <div class="spinner"></div>
  <div class="wait-title">Waiting for opponent</div>
  <div class="wait-code" id="wait-code" onclick="copyCode()">------</div>
  <div class="wait-hint">Tap code to copy &amp; share</div>
</div>

<!-- ERROR -->
<div id="error-screen">
  <div class="result-icon">⚠</div>
  <div class="err-title">Error</div>
  <div class="err-msg" id="error-msg">Something went wrong.</div>
  <button class="btn-primary" onclick="history.back()">Go Back</button>
  <button class="btn-secondary" onclick="location.reload()">Retry</button>
</div>

<!-- RESULT -->
<div id="result-overlay">
  <div class="result-icon" id="result-icon"></div>
  <div class="result-title" id="result-title"></div>
  <div class="result-sub"  id="result-sub"></div>
  <div class="result-coins" id="result-coins"></div>
  <button class="btn-primary" onclick="history.back()">Back to Games</button>
  <button class="btn-secondary" onclick="location.reload()">Play Again</button>
</div>

<!-- HEADER -->
<header>
  <button class="back-btn" onclick="confirmLeave()">← Back</button>
  <div class="logo"><span class="x">X</span><span class="o">O</span></div>
  <div class="pot-badge" id="header-pot">🪙 —</div>
</header>

<!-- GAME -->
<main>
  <div class="scoreboard">
    <div class="player-slot" id="slot-x">
      <div class="player-sym x">✕</div>
      <div class="player-name" id="name-x">Player X</div>
    </div>
    <div class="vs-text">VS</div>
    <div class="player-slot" id="slot-o">
      <div class="player-sym o">○</div>
      <div class="player-name" id="name-o">Player O</div>
    </div>
  </div>

  <div class="status their-turn" id="status-bar">—</div>

  <div class="board" id="board">
    <div class="cell" onclick="makeMove(0)"></div>
    <div class="cell" onclick="makeMove(1)"></div>
    <div class="cell" onclick="makeMove(2)"></div>
    <div class="cell" onclick="makeMove(3)"></div>
    <div class="cell" onclick="makeMove(4)"></div>
    <div class="cell" onclick="makeMove(5)"></div>
    <div class="cell" onclick="makeMove(6)"></div>
    <div class="cell" onclick="makeMove(7)"></div>
    <div class="cell" onclick="makeMove(8)"></div>
  </div>
</main>

<script>
// ── PARAMS ──
const params   = new URLSearchParams(location.search);
const LOBBY_ID = params.get('lobby');
const TOKEN    = params.get('token');

if (!LOBBY_ID || !TOKEN) showError('Missing lobby or token.');

// ── STATE ──
let myUsername    = null;
let mySymbol      = null;
let opponentName  = null;
let board         = Array(9).fill(null);
let gameOver      = false;
let isMyTurn      = false;
let gameStarted   = false;
let pot           = 0;
let lobbyCode     = '';
let ws            = null;

const WIN_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

// ── TOAST ──
let _toastTimer;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.className = '', 2800);
}

// ── ERROR ──
function showError(msg) {
  document.getElementById('waiting-overlay').style.display = 'none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-screen').classList.add('show');
}

// ── API ──
async function api(method, path, body) {
  try {
    const r = await fetch(location.origin + path, {
      method,
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
      body: body ? JSON.stringify(body) : undefined,
    });
    return await r.json();
  } catch { return { ok: false, error: 'Network error.' }; }
}

// ── COPY CODE ──
function copyCode() {
  if (!lobbyCode) return;
  navigator.clipboard.writeText(lobbyCode)
    .then(() => showToast(`Code ${lobbyCode} copied!`, 'success'))
    .catch(() => showToast(`Code: ${lobbyCode}`, 'info'));
}

// ── INIT ──
async function init() {
  const me = await api('GET', '/api/me');
  if (!me.ok) { showError('Session expired. Please log in again.'); return; }
  myUsername = me.username;

  const ld = await api('GET', `/api/lobby/${LOBBY_ID}`);
  if (!ld.ok) { showError('Lobby not found.'); return; }

  pot       = ld.lobby.pot;
  lobbyCode = ld.lobby.lobby_code || '';
  document.getElementById('header-pot').textContent  = `🪙 ${pot}`;
  document.getElementById('wait-code').textContent   = lobbyCode || '------';

  const members = ld.members || [];
  if (members.length >= 1) {
    const first  = members[0];
    const second = members[1];
    mySymbol     = (first.username === myUsername) ? 'X' : 'O';
    opponentName = mySymbol === 'X'
      ? (second ? second.display_name : '?')
      : first.display_name;

    document.getElementById('name-x').textContent =
      members[0].username === myUsername ? 'You' : members[0].display_name;
    document.getElementById('name-o').textContent =
      members[1] ? (members[1].username === myUsername ? 'You' : members[1].display_name) : '...';
  }

  isMyTurn = (mySymbol === 'X');

  if (members.length >= 2) {
    document.getElementById('waiting-overlay').style.display = 'none';
    gameStarted = true;
    updateStatus();
  }

  connectWs();
}

// ── WEBSOCKET ──
function connectWs() {
  if (ws) ws.close();
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?lobby_id=${LOBBY_ID}&token=${TOKEN}`);

  ws.onopen  = () => console.log('[XO] connected');
  ws.onclose = () => {
    if (!gameOver) showToast('Connection lost — reconnecting...', 'error');
    setTimeout(connectWs, 3000);
  };
  ws.onerror = () => {};
  ws.onmessage = e => {
    try { handleMsg(JSON.parse(e.data)); } catch {}
  };

  setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'ping' }));
  }, 25000);
}

function handleMsg(msg) {
  if (msg.type === 'system') {
    if (msg.message && msg.message.includes('joined')) refreshLobby();
    return;
  }
  if (msg.type === 'match_start' || msg.type === 'player_joined') {
    if (!gameStarted) refreshLobby();
    return;
  }
  if (msg.type === 'xo_move') {
    if (msg.player !== myUsername) applyMove(msg.index, msg.symbol, false);
    return;
  }
  if (msg.type === 'player_left') {
    if (!gameOver) showToast('Opponent disconnected!', 'error');
    return;
  }
}

async function refreshLobby() {
  const ld = await api('GET', `/api/lobby/${LOBBY_ID}`);
  if (!ld.ok) return;
  const members = ld.members || [];
  if (members.length < 2) return;

  pot = ld.lobby.pot;
  document.getElementById('header-pot').textContent = `🪙 ${pot}`;

  const first  = members[0];
  const second = members[1];
  opponentName = (first.username === myUsername) ? second.display_name : first.display_name;

  document.getElementById('name-x').textContent =
    members[0].username === myUsername ? 'You' : members[0].display_name;
  document.getElementById('name-o').textContent =
    members[1].username === myUsername ? 'You' : members[1].display_name;

  document.getElementById('waiting-overlay').style.display = 'none';
  gameStarted = true;
  isMyTurn    = (mySymbol === 'X');
  updateStatus();
  showToast('Opponent joined — game on!', 'success');
}

// ── MOVE ──
function makeMove(index) {
  if (!gameStarted || !isMyTurn || gameOver || board[index] !== null) return;
  applyMove(index, mySymbol, true);
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'xo_move', index, symbol: mySymbol, player: myUsername }));
  }
}

function applyMove(index, symbol, isMine) {
  if (board[index] !== null || gameOver) return;
  board[index] = symbol;

  const cell = document.querySelectorAll('.cell')[index];
  cell.textContent = symbol === 'X' ? '✕' : '○';
  cell.classList.add('taken', symbol.toLowerCase());

  isMyTurn = !isMine;

  const result = checkWin();
  if (!result) updateStatus();
}

// ── WIN CHECK ──
function checkWin() {
  for (const [a,b,c] of WIN_LINES) {
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      highlightWin([a,b,c]);
      const iWon = board[a] === mySymbol;
      endGame(iWon ? 'win' : 'lose', iWon ? myUsername : opponentName);
      return true;
    }
  }
  if (board.every(c => c !== null)) { endGame('draw', null); return true; }
  return false;
}

function highlightWin(indices) {
  const cells = document.querySelectorAll('.cell');
  indices.forEach(i => cells[i].classList.add('winning'));
}

// ── END GAME ──
async function endGame(result, winnerUsername) {
  gameOver = true;
  updateStatus(result);

  const shouldReport = (result === 'win' && winnerUsername === myUsername) ||
                       (result === 'draw' && mySymbol === 'X');
  if (shouldReport && result !== 'draw') {
    await api('POST', '/api/match/result', { lobby_id: LOBBY_ID, winner_username: winnerUsername });
  }

  setTimeout(() => showResult(result, winnerUsername), 800);
}

function showResult(result, winner) {
  const icon  = document.getElementById('result-icon');
  const title = document.getElementById('result-title');
  const sub   = document.getElementById('result-sub');
  const coins = document.getElementById('result-coins');

  if (result === 'win') {
    icon.textContent  = '🏆';
    title.textContent = 'You Win';
    title.style.color = 'var(--coin)';
    sub.textContent   = `${opponentName} has been defeated`;
    coins.textContent = `+${pot} 🪙`;
  } else if (result === 'lose') {
    icon.textContent  = '✕';
    title.textContent = 'You Lost';
    title.style.color = 'var(--x-col)';
    sub.textContent   = `${winner} wins this round`;
    coins.textContent = '';
  } else {
    icon.textContent  = '○';
    title.textContent = 'Draw';
    title.style.color = 'var(--white)';
    sub.textContent   = 'Nobody wins this time';
    coins.textContent = 'Stake will be refunded';
  }

  document.getElementById('result-overlay').classList.add('show');
}

// ── STATUS BAR ──
function updateStatus(result) {
  const bar  = document.getElementById('status-bar');
  const sx   = document.getElementById('slot-x');
  const so   = document.getElementById('slot-o');
  sx.className = 'player-slot';
  so.className = 'player-slot';
  bar.className = 'status';

  if (result === 'win')  { bar.textContent = 'You win'; bar.classList.add('win');  return; }
  if (result === 'lose') { bar.textContent = 'You lost'; bar.classList.add('lose'); return; }
  if (result === 'draw') { bar.textContent = 'Draw'; bar.classList.add('draw');    return; }

  if (isMyTurn) {
    bar.textContent = 'Your turn';
    bar.classList.add('your-turn');
    if (mySymbol === 'X') sx.classList.add('active-x');
    else so.classList.add('active-o');
  } else {
    bar.textContent = `${opponentName || 'Opponent'}'s turn`;
    bar.classList.add('their-turn');
    if (mySymbol === 'X') so.classList.add('active-o');
    else sx.classList.add('active-x');
  }
}

// ── LEAVE ──
function confirmLeave() {
  if (gameOver) { history.back(); return; }
  if (confirm('Leave game? You will forfeit your stake.')) history.back();
}

// ── START ──
if (LOBBY_ID && TOKEN) init();
</script>
</body>
</html>
